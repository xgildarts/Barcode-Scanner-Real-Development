<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/public/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PanPacific University</title>
    <link rel="stylesheet" href="/css/teacher-css/teacher_global.css">
    <link rel="stylesheet" href="/css/teacher-css/teacher_login.css">
    <style>
    .pw-eye{position:absolute;right:10px;background:none;border:none;cursor:pointer;padding:4px;opacity:0.45;display:flex;align-items:center;transition:opacity 0.2s}
    .pw-eye:hover,.pw-eye.visible{opacity:0.85}
    .pw-eye svg{width:20px;height:20px;fill:#1a4545}
    </style>
    <script>
    var EYE_OPEN  = 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z';
    var EYE_CLOSE = 'M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z';
    function togglePw(inputId, btn) {
        var input = document.getElementById(inputId);
        var show  = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.classList.toggle('visible', show);
        var path = btn.querySelector('svg path');
        path.setAttribute('d', show ? EYE_CLOSE : EYE_OPEN);
    }
    </script>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">
               <img src="../public/logo.png" alt="">
            </div>
        </div>

        <div class="welcome-text">
            <div class="role-badge" style="
                display:inline-flex;align-items:center;gap:8px;
                background:#1a3a3a;
                border:1.5px solid #00695c;
                border-radius:20px;
                padding:6px 16px 6px 10px;
                margin:8px auto 4px;
            ">
                <span style="width:8px;height:8px;border-radius:50%;background:#009688;flex-shrink:0;box-shadow:0 0 6px #009688;"></span>
                <svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:#80cbc4;flex-shrink:0;">
                    <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
                </svg>
                <span style="font-size:12px;font-weight:700;color:#80cbc4;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;">Teacher Portal</span>
            </div>
            <h2>Welcome back! Please login</h2>
            <p>to your account.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    <input type="password" id="password" class="form-input" style="padding-right:42px" placeholder="Enter your password" required>
                    <button type="button" class="pw-eye" onclick="togglePw('password',this)">
                        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Log In</button>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="teacher_login.js"></script>
</body>
</html>
