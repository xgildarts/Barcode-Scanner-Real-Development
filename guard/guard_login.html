<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Login - PanPacific University</title>
    <link rel="stylesheet" href="/css/guard-css/guard_login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
    .pw-eye{position:absolute;right:10px;background:none;border:none;cursor:pointer;padding:4px;opacity:0.45;display:flex;align-items:center;transition:opacity 0.2s}
    .pw-eye:hover,.pw-eye.visible{opacity:0.85}
    .pw-eye svg{width:20px;height:20px;fill:#1a4545}
    </style>
    <script>
    var EYE_OPEN  = 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z';
    var EYE_CLOSE = 'M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z';
    function togglePw(inputId, btn) {
        var input = document.getElementById(inputId);
        var show  = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.classList.toggle('visible', show);
        var path = btn.querySelector('svg path');
        path.setAttribute('d', show ? EYE_CLOSE : EYE_OPEN);
    }
    </script>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">
               <img src="/public/logo.png" alt="Logo">
            </div>
        </div>
        <div class="welcome-text">
            <div class="role-badge" style="
                display:inline-flex;align-items:center;gap:8px;
                background:#2a1a4a;
                border:1.5px solid #6a1b9a;
                border-radius:20px;
                padding:6px 16px 6px 10px;
                margin:8px auto 4px;
            ">
                <span style="width:8px;height:8px;border-radius:50%;background:#9c27b0;flex-shrink:0;box-shadow:0 0 6px #9c27b0;"></span>
                <svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:#ce93d8;flex-shrink:0;">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4.4l6 2.67V11c0 3.71-2.56 7.17-6 8.25-3.44-1.08-6-4.54-6-8.25V8.07L12 5.4z"/>
                </svg>
                <span style="font-size:12px;font-weight:700;color:#ce93d8;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;">Security Guard Portal</span>
            </div>
            <h2>Welcome back! Please login</h2>
            <p>to your account.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    <input type="password" id="password" class="form-input" style="padding-right:42px" placeholder="Enter your password" required>
                    <button type="button" class="pw-eye" onclick="togglePw('password',this)">
                        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>
    </div>

    <script>

        const URL_BASED = 'https://32g7g83w-3000.asse.devtunnels.ms/api/v1';

        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('guard_email_remember');
            if(savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            try {
                Swal.fire({
                    title: 'Logging in...',
                    didOpen: () => Swal.showLoading()
                });

                const response = await fetch(`${URL_BASED}/guard/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, device_info: await getDeviceInfo() })
                });

                const result = await response.json();

                if (result.ok) {
 
                    getDeviceInfo().then(di => localStorage.setItem('guard_device_info', di));
                localStorage.setItem('guard_token', result.token);
                    localStorage.setItem('guard_name', result.guard_name);

                    // Handle Remember Me
                    if(rememberMe) {
                        localStorage.setItem('guard_email_remember', email);
                    } else {
                        localStorage.removeItem('guard_email_remember');
                    }
                    Swal.fire({
                        icon: 'success',
                        title: 'Login Successful',
                        text: 'Redirecting to dashboard...',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'guard_camera_scan.html'; // Change to your actual file path
                    });
                } else {
                    Swal.fire({
                    icon: 'error',
                    title: 'Login Failed',
                    text: 'Invalid username or password!'
                });
                }

            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Failed',
                    text: 'Server connection error'
                });
            }
        });
        document.querySelector('.forgot-password').addEventListener('click', async function (e) {
            e.preventDefault();

            // Step 1 — Enter email
            const { value: email, isConfirmed: step1ok } = await Swal.fire({
                title: 'Forgot Password',
                html: `<p style="color:#555;margin-bottom:16px">Enter your registered email and we'll send you a 6-digit reset code.</p>
                       <input id="swal-email" class="swal2-input" type="email" placeholder="Enter your email">`,
                confirmButtonText: 'Send Code',
                confirmButtonColor: '#3d6b6b',
                showCancelButton: true,
                focusConfirm: false,
                preConfirm: () => {
                    const val = document.getElementById('swal-email').value.trim();
                    if (!val) { Swal.showValidationMessage('Please enter your email.'); return false; }
                    if (!/\S+@\S+\.\S+/.test(val)) { Swal.showValidationMessage('Enter a valid email address.'); return false; }
                    return val;
                }
            });
            if (!step1ok || !email) return;

            Swal.fire({ title: 'Sending code...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${URL_BASED}/guard/forgot_password/request_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (!res.ok) return Swal.fire({ icon: 'error', title: 'Error', text: data.message });
            } catch {
                return Swal.fire({ icon: 'error', title: 'Server Error', text: 'Could not send the code. Please try again.' });
            }

            // Step 2 — Enter OTP
            const { value: otp, isConfirmed: step2ok } = await Swal.fire({
                title: 'Enter Reset Code',
                html: `<p style="color:#555;margin-bottom:8px">A 6-digit code was sent to <strong>${email}</strong>.</p>
                       <p style="color:#999;font-size:12px;margin-bottom:16px">Valid for 5 minutes.</p>
                       <input id="swal-otp" class="swal2-input" type="text" maxlength="6" placeholder="_ _ _ _ _ _"
                           style="letter-spacing:10px;font-size:24px;font-weight:700;text-align:center">`,
                confirmButtonText: 'Verify Code',
                confirmButtonColor: '#3d6b6b',
                showCancelButton: true,
                focusConfirm: false,
                preConfirm: () => {
                    const val = document.getElementById('swal-otp').value.trim();
                    if (!val || val.length !== 6 || !/^\d{6}$/.test(val)) {
                        Swal.showValidationMessage('Enter the 6-digit code sent to your email.');
                        return false;
                    }
                    return val;
                }
            });
            if (!step2ok || !otp) return;

            Swal.fire({ title: 'Verifying...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${URL_BASED}/guard/forgot_password/verify_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();
                if (!res.ok) return Swal.fire({ icon: 'error', title: 'Invalid Code', text: data.message });
            } catch {
                return Swal.fire({ icon: 'error', title: 'Server Error', text: 'Verification failed. Please try again.' });
            }

            // Step 3 — New password
            const { value: passwords, isConfirmed: step3ok } = await Swal.fire({
                title: 'Set New Password',
                html: `<input id="swal-pw1" class="swal2-input" type="password" placeholder="New password">
                       <input id="swal-pw2" class="swal2-input" type="password" placeholder="Confirm new password">`,
                confirmButtonText: 'Reset Password',
                confirmButtonColor: '#3d6b6b',
                showCancelButton: true,
                focusConfirm: false,
                preConfirm: () => {
                    const pw1 = document.getElementById('swal-pw1').value;
                    const pw2 = document.getElementById('swal-pw2').value;
                    if (!pw1 || !pw2) { Swal.showValidationMessage('Please fill in both fields.'); return false; }
                    if (pw1.length < 6) { Swal.showValidationMessage('Password must be at least 6 characters.'); return false; }
                    if (pw1 !== pw2) { Swal.showValidationMessage('Passwords do not match.'); return false; }
                    return { new_password: pw1, confirm_password: pw2 };
                }
            });
            if (!step3ok || !passwords) return;

            Swal.fire({ title: 'Resetting password...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${URL_BASED}/guard/forgot_password/reset_password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, ...passwords })
                });
                const data = await res.json();
                if (!res.ok) return Swal.fire({ icon: 'error', title: 'Error', text: data.message });
                Swal.fire({ icon: 'success', title: 'Password Reset!', text: 'You can now log in with your new password.', confirmButtonColor: '#3d6b6b' });
            } catch {
                Swal.fire({ icon: 'error', title: 'Server Error', text: 'Something went wrong. Please try again.' });
            }
        });
    </script>
<script>
async function getDeviceInfo() {
    try {
        if (navigator.userAgentData) {
            const data = await navigator.userAgentData.getHighEntropyValues([
                'model', 'platform', 'platformVersion', 'mobile'
            ]).catch(() => ({}));
            const model    = (data.model || '').trim();
            const platform = (data.platform || navigator.userAgentData.platform || '').trim();
            const ver      = (data.platformVersion || '').split('.')[0];
            const brands   = navigator.userAgentData.brands || [];
            const browser  = brands.find(b => /chrome|edge|opera/i.test(b.brand) && !/chromium/i.test(b.brand))
                          || brands.find(b => /chromium/i.test(b.brand));
            const browserStr = browser
                ? browser.brand.replace('Google Chrome','Chrome').replace('Microsoft Edge','Edge') + ' ' + browser.version.split('.')[0]
                : '';
            const osStr = platform + (ver && ver !== '0' ? ' ' + ver : '');
            const parts = [browserStr, osStr, model].filter(Boolean);
            if (parts.length > 0) return parts.join(' x ').replace(/ x /g, ' · ');
        }
    } catch (_) {}
    return parseUAString(navigator.userAgent);
}

function parseUAString(ua) {
    if (!ua) return 'Unknown Device';
    let browser = 'Browser', os = '';
    if (ua.indexOf('Edg/') !== -1)               browser = 'Edge';
    else if (ua.indexOf('OPR/') !== -1)          browser = 'Opera';
    else if (ua.indexOf('SamsungBrowser') !== -1) browser = 'Samsung Browser';
    else if (ua.indexOf('Chrome/') !== -1)       browser = 'Chrome';
    else if (ua.indexOf('Firefox/') !== -1)      browser = 'Firefox';
    else if (ua.indexOf('Safari/') !== -1)       browser = 'Safari';
    if (ua.indexOf('Windows NT 10') !== -1)        os = 'Windows 10/11';
    else if (ua.indexOf('Windows NT 6.3') !== -1) os = 'Windows 8.1';
    else if (ua.indexOf('Windows NT 6') !== -1)    os = 'Windows 7/8';
    else if (ua.indexOf('Android') !== -1) {
        const vMatch = ua.match(/Android ([0-9.]+)/);
        const mMatch = ua.match(/Android[^;]+;\s*([^)]+)\)/);
        const raw = mMatch ? mMatch[1].replace(/\s*Build\/.*$/, '').trim() : '';
        os = 'Android' + (vMatch ? ' ' + vMatch[1] : '');
        if (raw && raw !== 'K') return browser + ' · ' + os + ' · ' + raw;
    }
    else if (ua.indexOf('iPhone') !== -1 || ua.indexOf('iPad') !== -1) {
        const vMatch = ua.match(/OS ([0-9_]+)/);
        os = 'iOS' + (vMatch ? ' ' + vMatch[1].replace(/_/g, '.') : '');
    }
    else if (ua.indexOf('Mac OS X') !== -1) {
        const vMatch = ua.match(/Mac OS X ([0-9_]+)/);
        os = 'macOS' + (vMatch ? ' ' + vMatch[1].replace(/_/g, '.') : '');
    }
    else if (ua.indexOf('Linux') !== -1) os = 'Linux';
    return (browser + (os ? ' · ' + os : '')) || ua.substring(0, 80);
}

</script>
</body>
</html>
