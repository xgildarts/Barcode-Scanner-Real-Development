<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Login - PanPacific University</title>
    <link rel="stylesheet" href="/css/guard-css/guard_login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">
               <img src="/public/logo.png" alt="Logo">
            </div>
        </div>
        <div class="welcome-text">
            <h2>Welcome back! Please login</h2>
            <p>to your account.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>
    </div>

    <script>

        const URL_BASED = 'https://32g7g83w-3000.asse.devtunnels.ms/api/v1';

        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('guard_email_remember');
            if(savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }

            document.querySelector('.forgot-password').addEventListener('click', async (e) => {
                e.preventDefault();
                forgotPassword();
            });
        });

        async function forgotPassword() {
            // Step 1 — Enter email
            const { value: email } = await Swal.fire({
                title: 'Forgot Password',
                input: 'email',
                inputLabel: 'Enter your registered email',
                inputPlaceholder: 'Enter your email',
                confirmButtonText: 'Send OTP',
                confirmButtonColor: '#2c5f5f',
                showCancelButton: true,
                inputValidator: v => !v ? 'Email is required.' : undefined
            });
            if (!email) return;

            Swal.fire({ title: 'Sending OTP...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const r1 = await fetch(`${URL_BASED}/guard/forgot_password/request_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const d1 = await r1.json();
                if (!d1.ok) return Swal.fire({ icon: 'error', title: 'Error', text: d1.message });
            } catch {
                return Swal.fire({ icon: 'error', title: 'Network Error', text: 'Please try again later.' });
            }

            // Step 2 — Enter OTP
            const { value: otp } = await Swal.fire({
                title: 'Enter OTP',
                html: `<p style="margin-bottom:12px;font-size:13px;color:#666">A 6-digit code was sent to <strong>${email}</strong>. Valid for 5 minutes.</p>
                       <input id="swal-otp" class="swal2-input" maxlength="6" placeholder="000000"
                        style="font-size:28px;letter-spacing:10px;text-align:center;width:200px">`,
                confirmButtonText: 'Verify',
                confirmButtonColor: '#2c5f5f',
                showCancelButton: true,
                focusConfirm: false,
                preConfirm: () => {
                    const v = document.getElementById('swal-otp').value.trim();
                    if (!v || v.length !== 6) { Swal.showValidationMessage('Enter the 6-digit OTP.'); return false; }
                    return v;
                }
            });
            if (!otp) return;

            Swal.fire({ title: 'Verifying...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const r2 = await fetch(`${URL_BASED}/guard/forgot_password/verify_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const d2 = await r2.json();
                if (!d2.ok) return Swal.fire({ icon: 'error', title: 'Invalid OTP', text: d2.message });
            } catch {
                return Swal.fire({ icon: 'error', title: 'Network Error', text: 'Please try again later.' });
            }

            // Step 3 — New password
            const { value: passwords } = await Swal.fire({
                title: 'Reset Password',
                html: `<input id="swal-new-pass" type="password" class="swal2-input" placeholder="New password (min 6 chars)">
                       <input id="swal-confirm-pass" type="password" class="swal2-input" placeholder="Confirm new password">`,
                confirmButtonText: 'Reset Password',
                confirmButtonColor: '#2c5f5f',
                showCancelButton: true,
                focusConfirm: false,
                preConfirm: () => {
                    const np = document.getElementById('swal-new-pass').value;
                    const cp = document.getElementById('swal-confirm-pass').value;
                    if (np.length < 6) { Swal.showValidationMessage('Password must be at least 6 characters.'); return false; }
                    if (np !== cp) { Swal.showValidationMessage('Passwords do not match.'); return false; }
                    return { new_password: np, confirm_password: cp };
                }
            });
            if (!passwords) return;

            Swal.fire({ title: 'Resetting...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const r3 = await fetch(`${URL_BASED}/guard/forgot_password/reset_password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, ...passwords })
                });
                const d3 = await r3.json();
                if (!d3.ok) return Swal.fire({ icon: 'error', title: 'Error', text: d3.message });
                Swal.fire({ icon: 'success', title: 'Password Reset!', text: 'You can now log in with your new password.', confirmButtonColor: '#2c5f5f' });
            } catch {
                Swal.fire({ icon: 'error', title: 'Network Error', text: 'Please try again later.' });
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            try {
                Swal.fire({
                    title: 'Logging in...',
                    didOpen: () => Swal.showLoading()
                });

                const response = await fetch(`${URL_BASED}/guard/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.ok) {
 
                    localStorage.setItem('guard_token', result.token);
                    localStorage.setItem('guard_name', result.guard_name);

                    // Handle Remember Me
                    if(rememberMe) {
                        localStorage.setItem('guard_email_remember', email);
                    } else {
                        localStorage.removeItem('guard_email_remember');
                    }
                    Swal.fire({
                        icon: 'success',
                        title: 'Login Successful',
                        text: 'Redirecting to dashboard...',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'guard_camera_scan.html'; // Change to your actual file path
                    });
                } else {
                    Swal.fire({
                    icon: 'error',
                    title: 'Login Failed',
                    text: 'Invalid username or password!'
                });
                }

            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Failed',
                    text: 'Server connection error'
                });
            }
        });
    </script>
</body>
</html>
