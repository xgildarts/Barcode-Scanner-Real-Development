/* ── Message Notification Bell ── */
.msg-notif-btn {
    position: relative;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: white;
    transition: background 0.2s; flex-shrink: 0;
}
.msg-notif-btn svg { fill: white; }
.msg-notif-btn:hover { background: rgba(255,255,255,0.28); }
.msg-notif-badge {
    position: absolute; top: -5px; right: -5px;
    background: #e53935; color: white;
    font-size: 10px; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 9px;
    padding: 0 4px; display: none;
    align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    animation: mnpulse 2s infinite;
}
@keyframes mnpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
.msg-notif-panel {
    position: fixed; top: 64px; right: 16px;
    width: 320px; max-height: 460px;
    background: #fff; border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    z-index: 4000; display: none; flex-direction: column;
    overflow: hidden; border: 1px solid #e0eeec;
}
.msg-notif-panel.open { display: flex; }
.msg-notif-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 16px;
    background: linear-gradient(135deg, #1a4545 0%, #2c5f5f 100%);
    color: white; font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.msg-notif-mark-all {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px; cursor: pointer;
}
.msg-notif-mark-all:hover { background: rgba(255,255,255,0.28); }
.msg-notif-list { overflow-y: auto; flex: 1; }
.msg-notif-empty { padding: 28px 16px; text-align: center; color: #aaa; font-size: 13px; }
.msg-notif-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 11px 14px; border-bottom: 1px solid #f0f0f0;
    cursor: pointer; transition: background 0.15s;
}
.msg-notif-item:last-child { border-bottom: none; }
.msg-notif-item:hover { background: #f7fafa; }
.msg-notif-item.unread { background: #eef8f5; }
.msg-notif-icon {
    width: 34px; height: 34px; border-radius: 50%;
    background: #e0f2f1; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 16px;
}
.msg-notif-body { flex: 1; min-width: 0; }
.msg-notif-sender { font-size: 13px; font-weight: 700; color: #1a4545; margin-bottom: 2px; }
.msg-notif-preview { font-size: 12px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-notif-time { font-size: 10px; color: #aaa; margin-top: 3px; }
.msg-notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #2e7d32; flex-shrink: 0; margin-top: 6px; }
.msg-notif-overlay { position: fixed; inset: 0; z-index: 3999; }
.msg-notif-item { position:relative !important; }
.notif-delete-btn { position:absolute; top:6px; right:6px; background:none; border:none; color:#aaa; font-size:16px; cursor:pointer; line-height:1; padding:2px 5px; border-radius:4px; opacity:0; transition:opacity 0.15s; }
.msg-notif-item:hover .notif-delete-btn { opacity:1; }
.notif-delete-btn:hover { color:#e53935; background:#ffebee; }
</style>

<script>
// ============================================================
// MESSAGE NOTIFICATION BELL
// ============================================================
(function() {
    let _msgNotifOpen = false;
    let _msgNotifData = [];

    let _prevMsgNotifUnread = null;

    async function fetchMsgNotifications() {
        try {
            const res = await fetch(`${URL_BASED}/guard/messages/notifications?limit=30`, {
                headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('guard_token') || '') }
            });
            const data = await res.json();
            if (!data.ok) return;
            _msgNotifData = data.notifications || [];
            const unread = data.unread || 0;
            const badge  = document.getElementById('msgNotifBadge');
            if (badge) {
                badge.textContent = unread > 99 ? '99+' : unread;
                badge.style.display = unread > 0 ? 'flex' : 'none';
            }
            // Play sound when new unread notifications arrive
            if (_prevMsgNotifUnread !== null && unread > _prevMsgNotifUnread) {
                if (typeof playChatSound === 'function') playChatSound('message');
            }
            _prevMsgNotifUnread = unread;
            if (_msgNotifOpen) renderMsgNotifPanel();
        } catch(e) {}
    }

    function toggleMsgNotifPanel() {
        _msgNotifOpen = !_msgNotifOpen;
        const panel   = document.getElementById('msgNotifPanel');
        const overlay = document.getElementById('msgNotifOverlay');
        if (panel)   panel.classList.toggle('open', _msgNotifOpen);
        if (overlay) overlay.style.display = _msgNotifOpen ? 'block' : 'none';
        if (_msgNotifOpen) renderMsgNotifPanel();
    }
    window.toggleMsgNotifPanel = toggleMsgNotifPanel;

    function closeMsgNotifPanel() {
        _msgNotifOpen = false;
        const panel   = document.getElementById('msgNotifPanel');
        const overlay = document.getElementById('msgNotifOverlay');
        if (panel)   panel.classList.remove('open');
        if (overlay) overlay.style.display = 'none';
    }
    window.closeMsgNotifPanel = closeMsgNotifPanel;

    function renderMsgNotifPanel() {
        const list = document.getElementById('msgNotifList');
        if (!list) return;
        if (!_msgNotifData.length) {
            list.innerHTML = '<div class="msg-notif-empty">No notifications yet</div>';
            return;
        }
        const _ROLE_C = { admin:'#2e7d32', super_admin:'#f57f17', teacher:'#1565c0', student:'#6a1b9a', guard:'#00695c' };
        list.innerHTML = _msgNotifData.map(n => {
            const unread  = !n.is_read;
            const preview = n.type === 'reaction'
                ? `Reacted ${n.emoji || ''} to your message`
                : (n.preview ? (n.preview.length > 50 ? n.preview.substring(0,50)+'…' : n.preview) : 'Sent a file');
            const d    = new Date((n.created_at+'').replace(' ','T'));
            const diff = Math.floor((Date.now() - d) / 1000);
            const time = diff < 60 ? 'Just now' : diff < 3600 ? Math.floor(diff/60)+'m ago'
                       : diff < 86400 ? Math.floor(diff/3600)+'h ago'
                       : d.toLocaleDateString('en-PH',{month:'short',day:'numeric'});
            const senderName = n.sender_name || 'Unknown';
            const senderRole = n.sender_role || 'student';
            const initial    = senderName.charAt(0).toUpperCase();
            const bgColor    = _ROLE_C[senderRole] || '#1a4545';
            const picFile    = n.sender_picture || null;
            const avatarHtml = picFile
                ? `<img src="${URL_BASED}/uploads/profile_pictures/${picFile}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;display:block;flex-shrink:0;" onerror="this.outerHTML='<div style=\'width:38px;height:38px;border-radius:50%;background:${bgColor};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:white;flex-shrink:0;\'>${initial}</div>'">`
                : `<div style="width:38px;height:38px;border-radius:50%;background:${bgColor};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:white;flex-shrink:0;">${initial}</div>`;
            return `<div class="msg-notif-item ${unread?'unread':''}" onclick="markMsgNotifRead(${n.id})">
                ${avatarHtml}
                <div class="msg-notif-body">
                    <div class="msg-notif-sender">${senderName}</div>
                    <div class="msg-notif-preview">${preview}</div>
                    <div class="msg-notif-time">${time}</div>
                </div>
                ${unread ? '<div class="msg-notif-dot"></div>' : ''}
                <button class="notif-delete-btn" onclick="event.stopPropagation();deleteNotif(${n.id})" data-tooltip="Delete">×</button>
            </div>`;
        }).join('');
    }

    async function markMsgNotifRead(id) {
        const n = _msgNotifData.find(x => String(x.id) === String(id));
        if (n && !n.is_read) {
            n.is_read = 1;
            fetch(`${URL_BASED}/guard/messages/notifications/read`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('guard_token') || '') },
                body: JSON.stringify({ ids: [id] })
            }).catch(() => {});
            fetchMsgNotifications();
        }
        closeMsgNotifPanel();
        if (n && n.sender_id && typeof window._chatOpenConv === 'function') {
            const panel = document.getElementById('chatPanel');
            const isMinimized = panel && panel.classList.contains('minimized');
            const isOpen      = panel && panel.classList.contains('open');
            if (isMinimized) {
                if (typeof window.minimizeChat === 'function') window.minimizeChat();
                setTimeout(() => {
                    window._chatOpenConv(n.sender_id, n.sender_role || 'teacher', n.sender_name || 'User', n.sender_picture || null);
                }, 200);
            } else {
                if (!isOpen && typeof toggleChat === 'function') toggleChat();
                setTimeout(() => {
                    window._chatOpenConv(n.sender_id, n.sender_role || 'teacher', n.sender_name || 'User', n.sender_picture || null);
                }, isOpen ? 0 : 350);
            }
        } else if (typeof toggleChat === 'function') {
            toggleChat();
        }
    }
    async function deleteNotif(id) {
        _msgNotifData = _msgNotifData.filter(n => String(n.id) !== String(id));
        renderMsgNotifPanel();
        fetch(`${BASE_URL || URL_BASED}/guard/messages/notifications/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('guard_token') || '') }
        }).catch(() => {});
    }
    window.deleteNotif = deleteNotif;

    window.markMsgNotifRead = markMsgNotifRead;

    async function markAllMsgNotifsRead() {
        fetch(`${URL_BASED}/guard/messages/notifications/read`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('guard_token') || '') },
            body: JSON.stringify({ ids: [] })
        }).catch(() => {});
        _msgNotifData.forEach(x => x.is_read = 1);
        fetchMsgNotifications();
        renderMsgNotifPanel();
    }
    window.markAllMsgNotifsRead = markAllMsgNotifsRead;

    fetchMsgNotifications();
    setInterval(fetchMsgNotifications, 8000);
})();
</script>
</body>
</html>
