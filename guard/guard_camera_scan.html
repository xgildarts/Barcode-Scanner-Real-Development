<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Barcode</title>
    <link rel="stylesheet" href="/css/guard-css/guard_camera_scan.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <h1 class="header-title">Scan Barcode</h1>
</div>

<div class="scanner-container">
    <div class="scanner-frame">
        <div class="scanner-viewfinder">
            <video id="camera" autoplay playsinline muted></video>

            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>

            <div class="scan-line"></div>
        </div>
    </div>

    <div class="instructions">
        <div class="instructions-title">
            Place the barcode inside the frame
        </div>
        <div class="instructions-text">
            Hold steady for automatic scanning
        </div>
    </div>

    <div class="action-buttons">
        <button class="action-btn scan-btn" onclick="startScan()">Scan Now</button>
        <button class="action-btn manual-btn" onclick="manualEntry()">Enter Manually</button>
    </div>
</div>

<script>
const video = document.getElementById("camera");
let scanning = false;
let stream = null;

// 1. Start Camera Logic
async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" } } // Force back camera
        });
        video.srcObject = stream;
    } catch (e) {
        // Fallback for laptop/testing if 'environment' fails
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        } catch (err) {
            Swal.fire("Error", "Camera access denied or unavailable", "error");
            console.error(err);
        }
    }
}

// 2. Scan Logic
async function startScan() {
    if (!("BarcodeDetector" in window)) {
        return Swal.fire("Error", "Barcode scanning not supported on this browser", "error");
    }

    if (scanning) return;
    scanning = true;

    const detector = new BarcodeDetector({
        formats: ["ean_13", "ean_8", "code_128", "code_39", "qr_code"]
    });

    const scanLoop = async () => {
        if (!scanning) return;

        try {
            const barcodes = await detector.detect(video);
            if (barcodes.length > 0) {
                // STOP scanning immediately so we don't get duplicate popups
                scanning = false; 
                const code = barcodes[0].rawValue;
                
                // Trigger the Option Modal
                showActionModal(code); 
            }
        } catch (err) {
            console.error(err);
        }

        if (scanning) {
            requestAnimationFrame(scanLoop);
        }
    };

    scanLoop();
}

// 3. The New Popup Logic (Time In / Time Out)
async function showActionModal(scannedCode) {
    // Play a beep sound (optional)
    // new Audio('/beep.mp3').play();

    const result = await Swal.fire({
        title: 'Barcode Detected!',
        text: `Code: ${scannedCode}`,
        icon: 'question',
        showDenyButton: true,
        showCancelButton: true,
        confirmButtonText: 'Time IN',
        confirmButtonColor: '#28a745', // Green
        denyButtonText: 'Time OUT',
        denyButtonColor: '#d33',       // Red
        cancelButtonText: 'Cancel',
        allowOutsideClick: false
    });

    if (result.isConfirmed) {
        processAttendance(scannedCode, 'TIME_IN');
    } else if (result.isDenied) {
        processAttendance(scannedCode, 'TIME_OUT');
    } else {
        // If Cancelled, restart scanning
        scanning = true;
        startScan();
    }
}

// 4. Placeholder for sending data to server
function processAttendance(code, type) {
    console.log(`Processing ${type} for ${code}`);
    
    // Example: Send to your backend API
    /*
    fetch('/api/v1/attendance/log', {
        method: 'POST',
        body: JSON.stringify({ barcode: code, type: type })
    })...
    */

    Swal.fire({
        title: 'Success!',
        text: `Recorded ${type} for ${code}`,
        icon: 'success',
        timer: 1500,
        showConfirmButton: false
    }).then(() => {
        // Resume scanning after success
        scanning = true;
        startScan();
    });
}

// 5. Manual Entry Update
async function manualEntry() {
    scanning = false; // Pause camera scanning while typing

    const { value: code } = await Swal.fire({
        title: 'Manual Entry',
        input: 'text',
        inputLabel: 'Enter Barcode Number',
        inputPlaceholder: 'Type here...',
        showCancelButton: true
    });

    if (code) {
        showActionModal(code); // Reuse the same choice modal
    } else {
        // If cancelled, resume camera
        scanning = true;
        startScan();
    }
}

function goBack() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop()); // Stop camera before leaving
    }
    history.back();
}

// Initialize
startCamera();
</script>

</body>
</html>
