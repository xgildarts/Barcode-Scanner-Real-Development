<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Barcode</title>
    <link rel="stylesheet" href="/css/guard-css/guard_camera_scan.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="/css/chat.css">
    <script src="/css/chat.js"></script>
    <link rel="stylesheet" href="/css/image-crop.css">
    <script src="/css/image-crop.js"></script>
<style>
/* ── Message Notification Bell ── */
.msg-notif-btn {
    position: relative;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: white;
    transition: background 0.2s; flex-shrink: 0;
}
.msg-notif-btn svg { fill: white; }
.msg-notif-btn:hover { background: rgba(255,255,255,0.28); }
.msg-notif-badge {
    position: absolute; top: -5px; right: -5px;
    background: #e53935; color: white;
    font-size: 10px; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 9px;
    padding: 0 4px; display: none;
    align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    animation: mnpulse 2s infinite;
}
@keyframes mnpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
.msg-notif-panel {
    position: fixed; top: 64px; right: 16px;
    width: 320px; max-height: 460px;
    background: #fff; border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    z-index: 4000; display: none; flex-direction: column;
    overflow: hidden; border: 1px solid #e0eeec;
}
.msg-notif-panel.open { display: flex; }
.msg-notif-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 16px;
    background: linear-gradient(135deg, #1a4545 0%, #2c5f5f 100%);
    color: white; font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.msg-notif-mark-all {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px; cursor: pointer;
}
.msg-notif-mark-all:hover { background: rgba(255,255,255,0.28); }
.msg-notif-list { overflow-y: auto; flex: 1; }
.msg-notif-empty { padding: 28px 16px; text-align: center; color: #aaa; font-size: 13px; }
.msg-notif-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 11px 14px; border-bottom: 1px solid #f0f0f0;
    cursor: pointer; transition: background 0.15s;
}
.msg-notif-item:last-child { border-bottom: none; }
.msg-notif-item:hover { background: #f7fafa; }
.msg-notif-item.unread { background: #eef8f5; }
.msg-notif-icon {
    width: 34px; height: 34px; border-radius: 50%;
    background: #e0f2f1; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 16px;
}
.msg-notif-body { flex: 1; min-width: 0; }
.msg-notif-sender { font-size: 13px; font-weight: 700; color: #1a4545; margin-bottom: 2px; }
.msg-notif-preview { font-size: 12px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-notif-time { font-size: 10px; color: #aaa; margin-top: 3px; }
.msg-notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #2e7d32; flex-shrink: 0; margin-top: 6px; }
.msg-notif-overlay { position: fixed; inset: 0; z-index: 3999; }
</style>
</head>

<body>

<div class="header">
    <button class="logout-btn" onclick="logout()" title="Logout">
        <i class="fa-solid fa-right-from-bracket"></i>
    </button>
    <h1 class="header-title">Scan Barcode</h1>
    <div style="display:flex;align-items:center;gap:8px;">
        <button class="msg-notif-btn" id="msgNotifBtn" onclick="toggleMsgNotifPanel()" title="Notifications">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
    </svg>
    <span class="msg-notif-badge" id="msgNotifBadge">0</span>
</button>
            <button class="chat-btn light-variant" onclick="toggleChat()" title="Messages" style="margin-right:4px;">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
            </svg>
            <span class="chat-badge" id="chatBadge"></span>
        </button>
        <!-- Profile avatar — click to change picture -->
        <div id="guardAvatarWrap" onclick="changeGuardPicture()" title="Change profile picture" style="
            width:36px;height:36px;border-radius:50%;
            background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.6);
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;overflow:hidden;flex-shrink:0;
            transition:border-color 0.2s,transform 0.2s;">
            <svg id="guardAvatarIcon" viewBox="0 0 24 24" width="20" height="20" fill="rgba(255,255,255,0.85)">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
        <input type="file" id="guardPicInput" accept="image/*" style="display:none;">
    </div>
</div>

<div class="scanner-container">
    <div class="scanner-frame">
        <div class="scanner-viewfinder">
            <video id="camera" autoplay playsinline muted></video>

            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>

            <div class="scan-line"></div>
        </div>
    </div>

    <div class="instructions">
        <div class="instructions-title">
            Place the barcode inside the frame
        </div>
        <div class="instructions-text">
            Hold steady for automatic scanning
        </div>
    </div>

    <div class="action-buttons">
        <button class="action-btn scan-btn" onclick="startScan()">Scan Now</button>
        <button class="action-btn manual-btn" onclick="manualEntry()">Enter Manually</button>
    </div>
</div>

<script src="app.js"></script>


        <!-- ── Chat Panel ── -->
        <div class="chat-panel" id="chatPanel">
            <div class="chat-panel-header">
                <div class="chat-panel-title">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                    Messages
                </div>
                <button class="chat-close-btn" onclick="closeChat()">×</button>
            </div>
            <div class="chat-view active" id="chatListView">
                <div class="chat-search-bar">
                    <input class="chat-search-input" id="chatSearchInput" placeholder="Search users to message...">
                </div>
                <div class="chat-contacts" id="chatContacts"></div>
            </div>
            <div class="chat-view" id="chatConvView">
                <div class="chat-conv-header">
                    <button class="chat-back-btn" onclick="chatBackToList()">&#8592;</button>
                    <div id="chatConvAvatarWrap"><div class="chat-avatar role-student" id="chatConvAvatar">?</div></div>
                    <div style="flex:1;min-width:0;">
                        <div class="chat-conv-name" id="chatConvName"></div>
                        <div class="chat-conv-role" id="chatConvRole"></div>
                    </div>
                </div>
                <!-- Pinned bar — shows when there are pinned messages -->
                <div class="chat-pin-bar" id="chatPinBar" style="display:none;" onclick="togglePinnedPanel()">
                    <span class="chat-pin-bar-icon">📌</span>
                    <span class="chat-pin-bar-text" id="chatPinBarText">1 pinned message</span>
                    <span class="chat-pin-bar-arrow" id="chatPinBarArrow">▾</span>
                </div>
                <!-- Pinned messages panel -->
                <div class="chat-pinned-panel" id="chatPinnedPanel" style="display:none;">
                    <div class="chat-pinned-header">
                        <span>📌 Pinned Messages</span>
                        <button class="chat-pinned-close" onclick="togglePinnedPanel()">×</button>
                    </div>
                    <div class="chat-pinned-list" id="chatPinnedList"></div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div id="chatFilePreview" class="chat-file-preview-bar"></div>
                <div class="chat-input-row">
                    <label class="chat-attach-btn" title="Attach file (max 100MB)">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                        </svg>
                        <input type="file" id="chatFileInput" style="display:none" accept="*/*">
                    </label>
                    <button class="chat-emoji-btn" id="chatEmojiBtn" title="Emoji" type="button">
                        😊
                    </button>
                                        <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"></textarea>
                    <button class="chat-send-btn" id="chatSendBtn">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    <link rel="stylesheet" href="/css/chat.css">
    <script src="/css/chat.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tok = localStorage.getItem('guard_token')
                if (tok) {
                    try {
                        const payload = JSON.parse(atob(tok.split('.')[1]))
                        initChat({
                            endpoint: (typeof URL_BASED !== 'undefined' ? URL_BASED : (typeof BASE_URL !== 'undefined' ? BASE_URL : '')) + '/guard',
                            getToken: () => localStorage.getItem('guard_token') || '',
                            myId:     payload.guard_id,
                            myRole:   payload.role || 'guard',
                            myName:   payload.guard_name || 'guard'
                        })
                } catch(e) { console.error('[Chat] initChat failed:', e) }
            }
        })
    </script>
<div class="msg-notif-panel" id="msgNotifPanel">
    <div class="msg-notif-header">
        <span>Notifications</span>
        <button class="msg-notif-mark-all" onclick="markAllMsgNotifsRead()">Mark all read</button>
    </div>
    <div class="msg-notif-list" id="msgNotifList">
        <div class="msg-notif-empty">No notifications yet</div>
    </div>
</div>
<div class="msg-notif-overlay" id="msgNotifOverlay" onclick="closeMsgNotifPanel()" style="display:none;"></div>
<script>
// ============================================================
// MESSAGE NOTIFICATION BELL
// ============================================================
(function() {
    let _msgNotifOpen = false;
    let _msgNotifData = [];

    async function fetchMsgNotifications() {
        try {
            const res = await fetch(`${URL_BASED}/guard/messages/notifications?limit=30`, {
                headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('guard_token') || '') }
            });
            const data = await res.json();
            if (!data.ok) return;
            _msgNotifData = data.notifications || [];
            const unread = data.unread || 0;
            const badge  = document.getElementById('msgNotifBadge');
            if (badge) {
                badge.textContent = unread > 99 ? '99+' : unread;
                badge.style.display = unread > 0 ? 'flex' : 'none';
            }
            if (_msgNotifOpen) renderMsgNotifPanel();
        } catch(e) {}
    }

    function toggleMsgNotifPanel() {
        _msgNotifOpen = !_msgNotifOpen;
        const panel   = document.getElementById('msgNotifPanel');
        const overlay = document.getElementById('msgNotifOverlay');
        if (panel)   panel.classList.toggle('open', _msgNotifOpen);
        if (overlay) overlay.style.display = _msgNotifOpen ? 'block' : 'none';
        if (_msgNotifOpen) renderMsgNotifPanel();
    }
    window.toggleMsgNotifPanel = toggleMsgNotifPanel;

    function closeMsgNotifPanel() {
        _msgNotifOpen = false;
        const panel   = document.getElementById('msgNotifPanel');
        const overlay = document.getElementById('msgNotifOverlay');
        if (panel)   panel.classList.remove('open');
        if (overlay) overlay.style.display = 'none';
    }
    window.closeMsgNotifPanel = closeMsgNotifPanel;

    function renderMsgNotifPanel() {
        const list = document.getElementById('msgNotifList');
        if (!list) return;
        if (!_msgNotifData.length) {
            list.innerHTML = '<div class="msg-notif-empty">No notifications yet</div>';
            return;
        }
        list.innerHTML = _msgNotifData.map(n => {
            const unread  = !n.is_read;
            const icon    = n.type === 'reaction' ? (n.emoji || '😀') : n.type === 'file' ? '📎' : '💬';
            const preview = n.type === 'reaction'
                ? `Reacted ${n.emoji || ''} to your message`
                : (n.preview ? (n.preview.length > 50 ? n.preview.substring(0,50)+'…' : n.preview) : 'Sent a file');
            const d    = new Date((n.created_at+'').replace(' ','T'));
            const diff = Math.floor((Date.now() - d) / 1000);
            const time = diff < 60 ? 'Just now' : diff < 3600 ? Math.floor(diff/60)+'m ago'
                       : diff < 86400 ? Math.floor(diff/3600)+'h ago'
                       : d.toLocaleDateString('en-PH',{month:'short',day:'numeric'});
            return `<div class="msg-notif-item ${unread?'unread':''}" onclick="markMsgNotifRead(${n.id})">
                <div class="msg-notif-icon">${icon}</div>
                <div class="msg-notif-body">
                    <div class="msg-notif-sender">${n.sender_name}</div>
                    <div class="msg-notif-preview">${preview}</div>
                    <div class="msg-notif-time">${time}</div>
                </div>
                ${unread ? '<div class="msg-notif-dot"></div>' : ''}
            </div>`;
        }).join('');
    }

    async function markMsgNotifRead(id) {
        const n = _msgNotifData.find(x => x.id === id);
        if (n && !n.is_read) {
            n.is_read = 1;
            fetch(`${URL_BASED}/guard/messages/notifications/read`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('guard_token') || '') },
                body: JSON.stringify({ ids: [id] })
            }).catch(() => {});
            fetchMsgNotifications();
        }
        closeMsgNotifPanel();
        if (typeof toggleChat === 'function') toggleChat();
    }
    window.markMsgNotifRead = markMsgNotifRead;

    async function markAllMsgNotifsRead() {
        fetch(`${URL_BASED}/guard/messages/notifications/read`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('guard_token') || '') },
            body: JSON.stringify({ ids: [] })
        }).catch(() => {});
        _msgNotifData.forEach(x => x.is_read = 1);
        fetchMsgNotifications();
        renderMsgNotifPanel();
    }
    window.markAllMsgNotifsRead = markAllMsgNotifsRead;

    fetchMsgNotifications();
    setInterval(fetchMsgNotifications, 8000);
})();
</script>
</body>
</html>
