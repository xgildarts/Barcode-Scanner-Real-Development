<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academics — Login</title>
    <link rel="stylesheet" href="/css/academics-css/academics_login.css">
</head>
<body>

<div class="login-container">
    <div class="logo-container">
        <div class="logo">
            <img src="/public/logo.png" alt="Logo" onerror="this.style.display='none';this.parentElement.innerHTML='<svg viewBox=\'0 0 24 24\' style=\'width:60px;height:60px;fill:#1e3a10\'><path d=\'M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm7 13.09V17h-2v-.91L12 18.91 3.41 14.5 2 15.28 12 21l10-5.72-1.41-.78-.59.59z\'/></svg>'">
        </div>
        <div class="role-badge">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
            Academics Portal
        </div>
        <div class="welcome-text">
            <h2>Welcome, Academics Officer</h2>
            <p>Manage teacher subjects & attendance</p>
        </div>
    </div>

    <div class="form-group">
        <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            <input type="email" id="emailInput" class="form-input" placeholder="academics@panpacificu.edu.ph" autocomplete="email">
        </div>
    </div>

    <div class="form-group">
        <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
            <input type="password" id="passwordInput" class="form-input" placeholder="Password" autocomplete="current-password">
            <button class="pw-toggle" onclick="togglePw()" tabindex="-1" type="button">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
        </svg>
        Sign In
    </button>
</div>

<script>
function togglePw() {
    const inp = document.getElementById('passwordInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});

async function doLogin() {
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errEl    = document.getElementById('errorMsg');
    const btn      = document.getElementById('loginBtn');

    errEl.style.display = 'none';
    if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
        const res  = await fetch('/api/v1/academics/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.ok) {
            localStorage.setItem('academics_token', data.token);
            localStorage.setItem('academics_id',    data.academics_id);
            localStorage.setItem('academics_name',  data.name);
            window.location.href = '/academics/academics_dashboard.html';
        } else {
            errEl.textContent   = data.message || 'Invalid credentials.';
            errEl.style.display = 'block';
            btn.disabled        = false;
            btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> Sign In`;
        }
    } catch (err) {
        errEl.textContent   = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> Sign In`;
    }
}
</script>
</body>
</html>
