<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academics Dashboard</title>
    <link rel="stylesheet" href="/css/academics-css/academics_global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
    <div class="top-bar-left">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="fill:#1e3a10;opacity:.7">
            <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
        </svg>
        <span class="portal-label">Academics Portal</span>
    </div>
    <div class="top-bar-right">
        <span class="top-bar-name" id="topBarName">—</span>
        <button class="logout-top-btn" onclick="doLogout()" title="Logout">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
            </svg>
            Logout
        </button>
    </div>
</div>

<!-- Tab Navigation -->
<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('subjects')" id="tabSubjects">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
        Subject Assignments
    </button>
    <button class="tab-btn" onclick="switchTab('attendance')" id="tabAttendance">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        Attendance Records
    </button>
    <button class="tab-btn" onclick="switchTab('qrcodes')" id="tabQR">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm13 3h2v2h-2v-2zm0-5h2v2h-2v-2zm-4 0h2v2h-2v-2zm0 5h2v2h-2v-2zm4-3h-2v-2h2v2z"/></svg>
        Teacher QR Codes
    </button>
</div>

<div class="main-content">

    <!-- ── TAB: Subject Assignments ── -->
    <div class="tab-panel active" id="panelSubjects">
        <div class="panel-header">
            <h2 class="panel-title">Subject Assignments</h2>
            <button class="btn-primary" onclick="openAssignModal()">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Assign Subject
            </button>
        </div>

        <!-- Filter row -->
        <div class="filter-row">
            <input class="search-input" id="subjectSearch" placeholder="Search teacher or subject…" oninput="filterSubjects()">
        </div>

        <div class="card">
            <table class="data-table" id="subjectsTable">
                <thead>
                    <tr>
                        <th>Teacher</th>
                        <th>Subject</th>
                        <th>Days</th>
                        <th>Semester End</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="subjectsBody">
                    <tr><td colspan="6" class="empty-row">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ── TAB: Attendance Records ── -->
    <div class="tab-panel" id="panelAttendance">
        <div class="panel-header">
            <h2 class="panel-title">Teacher Attendance</h2>
            <button class="btn-secondary" onclick="exportAttendance()">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
                Export
            </button>
        </div>

        <!-- Filters -->
        <div class="filter-row">
            <input type="date" class="filter-select" id="attDateFilter" onchange="loadAttendance()">
            <select class="filter-select" id="attTeacherFilter" onchange="loadAttendance()">
                <option value="">All Teachers</option>
            </select>
            <select class="filter-select" id="attStatusFilter" onchange="loadAttendance()">
                <option value="">All Status</option>
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
            </select>
            <button class="btn-ghost" onclick="clearAttFilters()">Clear</button>
        </div>

        <div class="card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Teacher</th>
                        <th>Date</th>
                        <th>Time In</th>
                        <th>Time Out</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="attendanceBody">
                    <tr><td colspan="5" class="empty-row">Select a date to load records.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ── TAB: QR Codes ── -->
    <div class="tab-panel" id="panelQR">
        <div class="panel-header">
            <h2 class="panel-title">Teacher QR Codes</h2>
            <span class="panel-sub">Each QR is the teacher's permanent check-in identity</span>
        </div>

        <div class="qr-grid" id="qrGrid">
            <div class="empty-row" style="text-align:center;padding:40px;">Loading…</div>
        </div>
    </div>

</div>

<!-- ── Assign Subject Modal ── -->
<div class="modal-overlay" id="assignModal" style="display:none;" onclick="closeAssignModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3>Assign Subject to Teacher</h3>
            <button class="modal-close" onclick="closeAssignModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Teacher</label>
                <select class="form-input" id="modalTeacher">
                    <option value="">Select teacher…</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Subject Name</label>
                <input type="text" class="form-input" id="modalSubject" placeholder="e.g. Big Data, Database Lec">
            </div>
            <div class="form-group">
                <label class="form-label">Schedule Days</label>
                <div class="days-grid">
                    <label class="day-check"><input type="checkbox" value="Monday">    Mon</label>
                    <label class="day-check"><input type="checkbox" value="Tuesday">   Tue</label>
                    <label class="day-check"><input type="checkbox" value="Wednesday"> Wed</label>
                    <label class="day-check"><input type="checkbox" value="Thursday">  Thu</label>
                    <label class="day-check"><input type="checkbox" value="Friday">    Fri</label>
                    <label class="day-check"><input type="checkbox" value="Saturday">  Sat</label>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Semester End Date</label>
                <input type="date" class="form-input" id="modalEndDate">
            </div>
            <div id="modalErr" class="error-msg" style="display:none;"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-ghost" onclick="closeAssignModal()">Cancel</button>
            <button class="btn-primary" onclick="saveAssignment()">Save Assignment</button>
        </div>
    </div>
</div>

<script src="/academics/app.js"></script>
</body>
</html>
