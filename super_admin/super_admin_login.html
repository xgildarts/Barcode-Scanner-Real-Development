<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login - PanPacific University</title>
    <link rel="stylesheet" href="/css/super-admin-css/super_admin_global.css">
    <link rel="stylesheet" href="/css/super-admin-css/super_admin_login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
    .pw-eye{position:absolute;right:10px;background:none;border:none;cursor:pointer;padding:4px;opacity:0.45;display:flex;align-items:center;transition:opacity 0.2s}
    .pw-eye:hover,.pw-eye.visible{opacity:0.85}
    .pw-eye svg{width:20px;height:20px;fill:#1e3a5f}
    </style>
    <script>
    var EYE_OPEN  = 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z';
    var EYE_CLOSE = 'M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z';
    function togglePw(inputId, btn) {
        var input = document.getElementById(inputId);
        var show  = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.classList.toggle('visible', show);
        var path = btn.querySelector('svg path');
        path.setAttribute('d', show ? EYE_CLOSE : EYE_OPEN);
    }
    </script>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">
               <img src="../public/logo.png" alt="Logo">
            </div>
        </div>

        <div class="welcome-text">
            <h2>Welcome back! Please login</h2>
            <p>to your Super Admin account.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    <input type="email" id="emailInput" class="form-input" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    <input type="password" id="passwordInput" class="form-input" style="padding-right:42px" placeholder="Enter your password" required>
                    <button type="button" class="pw-eye" onclick="togglePw('passwordInput',this)">
                        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('ppu_superadmin_email');
            if (savedEmail) {
                document.getElementById('emailInput').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        const URL_BASED = 'https://32g7g83w-3000.asse.devtunnels.ms/api/v1'

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email      = document.getElementById('emailInput').value.trim();
            const password   = document.getElementById('passwordInput').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            Swal.fire({
                title: 'Logging in...',
                didOpen: () => Swal.showLoading()
            });

            try {
                const response = await fetch(`${URL_BASED}/super_admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, device_info: await getDeviceInfo() })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Invalid credentials');
                }

                localStorage.setItem('super_admin_token', data.token);
                localStorage.setItem('super_admin_name',  data.super_admin_name);

                if (rememberMe) {
                    localStorage.setItem('ppu_superadmin_email', email);
                } else {
                    localStorage.removeItem('ppu_superadmin_email');
                }

                await Swal.fire({
                    icon: 'success',
                    title: 'Welcome!',
                    text: 'Login successful. Redirecting...',
                    timer: 1500,
                    showConfirmButton: false
                });

                window.location.href = 'super_admin_dashboard.html';

            } catch (error) {
                console.error(error);
                Swal.fire({
                    icon: 'error',
                    title: 'Login Failed',
                    text: error.message
                });
            }
        });

        document.querySelector('.forgot-password').addEventListener('click', async function(e) {
            e.preventDefault();

            // Step 1 — Email
            const { value: email, isConfirmed: step1ok } = await Swal.fire({
                title: 'Forgot Password',
                text: 'Enter your Super Admin email address.',
                input: 'email',
                inputPlaceholder: 'superadmin@panpacificu.edu.ph',
                showCancelButton: true,
                confirmButtonText: 'Send OTP',
                confirmButtonColor: '#1e3a5f',
                inputValidator: v => !v && 'Please enter your email.'
            });
            if (!step1ok || !email) return;

            Swal.fire({ title: 'Sending OTP...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const r1 = await fetch(`${URL_BASED}/super_admin/forgot_password/request_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const d1 = await r1.json();
                if (!r1.ok) throw new Error(d1.message);
            } catch (err) {
                return Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            }

            // Step 2 — OTP
            const { value: otp, isConfirmed: step2ok } = await Swal.fire({
                title: 'Enter OTP',
                html: `<p style="margin-bottom:12px;font-size:14px;color:#666">A 6-digit code was sent to <strong>${email}</strong>. Valid for 5 minutes.</p>
                       <input id="swal-otp" class="swal2-input" maxlength="6" placeholder="_ _ _ _ _ _"
                              style="font-size:28px;letter-spacing:10px;text-align:center;width:200px">`,
                showCancelButton: true,
                confirmButtonText: 'Verify',
                confirmButtonColor: '#1e3a5f',
                preConfirm: () => {
                    const v = document.getElementById('swal-otp').value.trim();
                    if (!/^\d{6}$/.test(v)) { Swal.showValidationMessage('Enter the 6-digit code.'); return false; }
                    return v;
                }
            });
            if (!step2ok || !otp) return;

            Swal.fire({ title: 'Verifying...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const r2 = await fetch(`${URL_BASED}/super_admin/forgot_password/verify_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const d2 = await r2.json();
                if (!r2.ok) throw new Error(d2.message);
            } catch (err) {
                return Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            }

            // Step 3 — New Password
            const { value: passwords, isConfirmed: step3ok } = await Swal.fire({
                title: 'Set New Password',
                html: `<input id="swal-newpw" type="password" class="swal2-input" placeholder="New password">
                       <input id="swal-confirmpw" type="password" class="swal2-input" placeholder="Confirm new password">`,
                showCancelButton: true,
                confirmButtonText: 'Reset Password',
                confirmButtonColor: '#1e3a5f',
                preConfirm: () => {
                    const np = document.getElementById('swal-newpw').value;
                    const cp = document.getElementById('swal-confirmpw').value;
                    if (np.length < 6) { Swal.showValidationMessage('Password must be at least 6 characters.'); return false; }
                    if (np !== cp)     { Swal.showValidationMessage('Passwords do not match.'); return false; }
                    return { new_password: np, confirm_password: cp };
                }
            });
            if (!step3ok || !passwords) return;

            Swal.fire({ title: 'Resetting...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const r3 = await fetch(`${URL_BASED}/super_admin/forgot_password/reset_password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, ...passwords })
                });
                const d3 = await r3.json();
                if (!r3.ok) throw new Error(d3.message);
                Swal.fire({ icon: 'success', title: 'Password Reset!', text: 'You can now log in with your new password.', confirmButtonColor: '#1e3a5f' });
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            }
        });
    </script>
<script>
async function getDeviceInfo() {
    try {
        if (navigator.userAgentData) {
            const data = await navigator.userAgentData.getHighEntropyValues([
                'model', 'platform', 'platformVersion', 'mobile'
            ]).catch(() => ({}));
            const model    = (data.model || '').trim();
            const platform = (data.platform || navigator.userAgentData.platform || '').trim();
            const ver      = (data.platformVersion || '').split('.')[0];
            const brands   = navigator.userAgentData.brands || [];
            const browser  = brands.find(b => /chrome|edge|opera/i.test(b.brand) && !/chromium/i.test(b.brand))
                          || brands.find(b => /chromium/i.test(b.brand));
            const browserStr = browser
                ? browser.brand.replace('Google Chrome','Chrome').replace('Microsoft Edge','Edge') + ' ' + browser.version.split('.')[0]
                : '';
            const osStr = platform + (ver && ver !== '0' ? ' ' + ver : '');
            const parts = [browserStr, osStr, model].filter(Boolean);
            if (parts.length > 0) return parts.join(' x ').replace(/ x /g, ' · ');
        }
    } catch (_) {}
    return parseUAString(navigator.userAgent);
}

function parseUAString(ua) {
    if (!ua) return 'Unknown Device';
    let browser = 'Browser', os = '';
    if (ua.indexOf('Edg/') !== -1)               browser = 'Edge';
    else if (ua.indexOf('OPR/') !== -1)          browser = 'Opera';
    else if (ua.indexOf('SamsungBrowser') !== -1) browser = 'Samsung Browser';
    else if (ua.indexOf('Chrome/') !== -1)       browser = 'Chrome';
    else if (ua.indexOf('Firefox/') !== -1)      browser = 'Firefox';
    else if (ua.indexOf('Safari/') !== -1)       browser = 'Safari';
    if (ua.indexOf('Windows NT 10') !== -1)        os = 'Windows 10/11';
    else if (ua.indexOf('Windows NT 6.3') !== -1) os = 'Windows 8.1';
    else if (ua.indexOf('Windows NT 6') !== -1)    os = 'Windows 7/8';
    else if (ua.indexOf('Android') !== -1) {
        const vMatch = ua.match(/Android ([0-9.]+)/);
        const mMatch = ua.match(/Android[^;]+;\s*([^)]+)\)/);
        const raw = mMatch ? mMatch[1].replace(/\s*Build\/.*$/, '').trim() : '';
        os = 'Android' + (vMatch ? ' ' + vMatch[1] : '');
        if (raw && raw !== 'K') return browser + ' · ' + os + ' · ' + raw;
    }
    else if (ua.indexOf('iPhone') !== -1 || ua.indexOf('iPad') !== -1) {
        const vMatch = ua.match(/OS ([0-9_]+)/);
        os = 'iOS' + (vMatch ? ' ' + vMatch[1].replace(/_/g, '.') : '');
    }
    else if (ua.indexOf('Mac OS X') !== -1) {
        const vMatch = ua.match(/Mac OS X ([0-9_]+)/);
        os = 'macOS' + (vMatch ? ' ' + vMatch[1].replace(/_/g, '.') : '');
    }
    else if (ua.indexOf('Linux') !== -1) os = 'Linux';
    return (browser + (os ? ' · ' + os : '')) || ua.substring(0, 80);
}

</script>
</body>
</html>
