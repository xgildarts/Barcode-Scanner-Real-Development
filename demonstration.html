<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FingerprintJS Demo</title>
</head>
<body>
    <h1>FingerprintJS v4 Module Demo</h1>
    <button id="getFingerprintBtn">Get Fingerprint</button>
    <pre id="output"></pre>

    <script type="module">
        // Import the module
        import FingerprintJS from 'https://openfpcdn.io/fingerprintjs/v4';

        document.getElementById('getFingerprintBtn').addEventListener('click', async () => {
            const fp = await FingerprintJS.load();
            const result = await fp.get();

            const output = document.getElementById('output');
            output.textContent = `
Visitor ID: ${result.visitorId}

Components:
${JSON.stringify(result.components, null, 2)}
            `;
        });
    </script>
</body>
</html>
