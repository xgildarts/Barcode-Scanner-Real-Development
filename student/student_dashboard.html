<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="../css/student-css/student_global.css">
    <link rel="stylesheet" href="../css/student-css/student_dashboard.css">
    <link rel="stylesheet" href="/css/student-css/student_settings.css">
</head>
<body>

    <div class="header">
        <div class="go-back-btn" id="goBackBtn" onclick="goBackBtn()">&#8592;</div>
        <h1 class="title" id="title">Student Dashboard</h1>
        <button class="settings-btn" onclick="tab('settings')">⚙</button>
    </div>

    <!--Barcode / QR Code-->
    <section id="generateBarcode" class="sections">
        <div class="profile-section">
            <div class="avatar-container">
                <div class="avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <div class="camera-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 15.2c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                        <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z"/>
                    </svg>
                </div>
            </div>
            <div class="profile-info">
                <div class="profile-name">Unknown</div>
                <div class="profile-id">0000000</div>
                <div class="profile-course">Unknown</div>
                <div class="profile-year">Unknown</div>
            </div>
        </div>
    
        <div class="barcode-card">
            <h2 class="barcode-title">Generate Code</h2>

            <!-- Type Selector -->
            <div class="code-type-selector">
                <button class="code-type-btn active" id="btnBarcode" onclick="setCodeType('barcode')">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M3 4h18v2H3V4zm0 7h18v2H3v-2zm0 7h18v2H3v-2z"/>
                    </svg>
                    Barcode
                </button>
                <button class="code-type-btn" id="btnQr" onclick="setCodeType('qr')">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm13 3h2v2h-2v-2zm0-5h2v2h-2v-2zm-4 0h2v2h-2v-2zm0 5h2v2h-2v-2zm4-3h-2v-2h2v2z"/>
                    </svg>
                    QR Code
                </button>
            </div>

            <div class="barcode-container">
                <!-- Barcode SVG -->
                <svg class="barcode" id="barcodeImage" viewBox="0 0 280 100" preserveAspectRatio="xMidYMid meet">
                    <!-- Barcode will be generated here -->
                </svg>
                <!-- QR Code div (hidden by default) -->
                <div id="qrCanvas" style="display:none; border-radius:8px;"></div>
                <div class="barcode-text">
                    This unique code is valid for<br>today only.
                </div>
            </div>
    
            <button class="generate-btn" onclick="checkBarcodeExpiration()">Generate today's code</button>
        </div>
    </section>

    <!--Attendance History-->
    <section id="attendanceHistory" class="sections">
        
        <div class="profile-section">
            <div class="avatar-container">
                <div class="avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <div class="camera-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 15.2c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                        <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z"/>
                    </svg>
                </div>
            </div>
            <div class="profile-info">
                <div class="profile-name">Unknown</div>
                <div class="profile-id">0000000</div>
                <div class="profile-course">Unknown</div>
                <div class="profile-year">Unknown</div>
            </div>
        </div>

        <div class="table-container">
            <table class="attendance-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Subject</th>
                        <th>Fullname</th>
                        <th>ID Number</th>
                    </tr>
                </thead>
                <tbody id="attendanceBody">
                    <!--Auto generated-->
                </tbody>
            </table>
        </div>
    </section>

    <div class="action-buttons"  id="actionButtons">
        <button id="generateBarcode" class="action-btn" onclick="tab('generateBarcode')">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 4h18v2H3V4zm0 7h18v2H3v-2zm0 7h18v2H3v-2z"/>
            </svg>
            Generate Barcode
        </button>
        <button id="attendanceHistory" class="action-btn" onclick="tab('attendanceHistory')">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            Attendance History
        </button>
    </div>

    <!--Student Settings-->
    <section  id="settings" class="sections">
        
        <div class="profile-section">
            <div class="avatar-container">
                <div class="avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <div class="camera-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 15.2c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                        <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z"/>
                    </svg>
                </div>
            </div>
            <div class="profile-info">
                <div class="profile-name">Unknown</div>
                <div class="profile-id">0000000</div>
                <div class="profile-course">Unknown</div>
                <div class="profile-year">Unknown</div>
            </div>
        </div>

        <div class="content-section">
            <div class="section-title">
                <span>Edit Profile</span>
                <button class="edit-profile-btn" onclick="toggleEdit()">Edit Profile</button>
            </div>
    
            <div class="form-card">

                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-input" id="firstName" value="Unknown" disabled>
                </div>
            
                <div class="form-group">
                    <label class="form-label">Middle Name</label>
                    <input type="text" class="form-input" id="middleName" value="Unknown" disabled>
                </div>
            
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-input" id="lastName" value="Unknown" disabled>
                </div>
            
                <div class="form-group">
                    <label class="form-label">ID Number</label>
                    <input type="text" class="form-input" id="idNumber" value="000000" disabled>
                </div>
            
                <div class="form-group">
                    <label class="form-label">Year Level</label>
                    <input type="text" class="form-input" id="yearLevel" value="0" disabled>
                </div>
            
                <div class="form-group">
                    <label class="form-label">Program</label>
                    <input type="text" class="form-input" id="program" value="Unknown" disabled>
                </div>
            
            </div>            
    
            <div class="password-section">
                <div class="section-title">
                    <span>Change Password</span>
                </div>
    
                <div class="form-card">
                    <div class="form-group">
                        <label class="form-label">Current Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" class="password-input" id="currentPassword" placeholder="••••••••">
                        </div>
                    </div>
    
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" class="password-input" id="newPassword" placeholder="••••••••">
                        </div>
                    </div>
    
                    <div class="form-group">
                        <label class="form-label">Confirm New Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" class="password-input" id="confirmPassword" placeholder="••••••••">
                        </div>
                    </div>
    
                    <button class="update-password-btn" onclick="updatePassword()">Update Password</button>
                </div>
            </div>
    
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .code-type-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .code-type-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 9px 20px;
            border: 2px solid #d0d0d0;
            border-radius: 10px;
            background: white;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .code-type-btn:hover {
            border-color: #5a8a7a;
            color: #3d6b6b;
        }
        .code-type-btn.active {
            border-color: #3d6b6b;
            background: #3d6b6b;
            color: white;
        }
        .code-type-btn.active svg {
            fill: white;
        }
        #qrCanvas {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 10px 0;
        }
        #qrCanvas img,
        #qrCanvas table {
            margin: 0 auto;
            display: block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
