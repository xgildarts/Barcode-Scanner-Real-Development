<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="../css/student-css/student_global.css">
    <link rel="stylesheet" href="/css/student-css/student_registration.css">
    <style>
        .swal-on-top { z-index: 99999 !important; }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo">
            <img src="../public/logo.png" alt="">
        </div>
        <h1>Student Registration</h1>
        <p class="subtitle">Fill in the required information.</p>
    </div>
    
    <div class="form-container">
        <form id="registrationForm">
            <div class="form-group">
                <label class="form-label">
                    First Name <span class="required">*</span>
                </label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <input id="firstName" type="text" class="form-input" placeholder="First Name" required>
                </div>
            </div>

            <div class="name-row">
                <div class="form-group">
                    <label class="form-label">Middle Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        <input id="middleName" type="text" class="form-input" placeholder="Middle Name">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        <input id="lastName" type="text" class="form-input" placeholder="Last Name">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Email <span class="required">*</span>
                </label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="example@panpacificu.edu.ph"
                        required
                        pattern="^[a-zA-Z0-9._%+-]+@panpacificu\.edu\.ph$"
                        title="Email must be a institutional"
                    />
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    ID Number <span class="required">*</span>
                </label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                    </svg>
                    <input id="idNumber" type="text" class="form-input" placeholder="ID Number" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Program <span class="required">*</span>
                </label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3z"/>
                    </svg>
                    <select id="program" class="form-select" required>
                        <option value="">Select Program</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Year Level <span class="required">*</span>
                </label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1z"/>
                    </svg>
                    <select id="yearLevel" class="form-select" required>
                        <option value="">Select Year</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Parent/Guardian Contact Number <span class="required">*</span>
                </label>
                <div class="input-wrapper" style="display:flex; align-items:stretch; padding:0; overflow:hidden;">
                    <select id="countryCode" style="background:#e8f0f0;border:none;border-right:1.5px solid #c0d4d4;padding:0 8px;font-weight:600;color:#1a4545;font-size:0.9rem;height:100%;min-height:44px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;padding-right:24px;background-image:url('data:image/svg+xml;utf8,<svg fill=\'%231a4545\' height=\'12\' viewBox=\'0 0 24 24\' width=\'12\' xmlns=\'http://www.w3.org/2000/svg\'><path d=\'M7 10l5 5 5-5z\'/></svg>');background-repeat:no-repeat;background-position:right 4px center;">
                        <option value="+63">🇵🇭 +63</option>
                        <option value="+1">🇺🇸 +1</option>
                        <option value="+44">🇬🇧 +44</option>
                        <option value="+61">🇦🇺 +61</option>
                        <option value="+81">🇯🇵 +81</option>
                        <option value="+82">🇰🇷 +82</option>
                        <option value="+86">🇨🇳 +86</option>
                        <option value="+65">🇸🇬 +65</option>
                        <option value="+60">🇲🇾 +60</option>
                        <option value="+66">🇹🇭 +66</option>
                        <option value="+62">🇮🇩 +62</option>
                        <option value="+84">🇻🇳 +84</option>
                        <option value="+91">🇮🇳 +91</option>
                        <option value="+971">🇦🇪 +971</option>
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+49">🇩🇪 +49</option>
                        <option value="+33">🇫🇷 +33</option>
                        <option value="+39">🇮🇹 +39</option>
                        <option value="+34">🇪🇸 +34</option>
                        <option value="+55">🇧🇷 +55</option>
                        <option value="+52">🇲🇽 +52</option>
                        <option value="+27">🇿🇦 +27</option>
                        <option value="+234">🇳🇬 +234</option>
                    </select>
                    <input 
                        id="guardianContactNumber" 
                        type="tel" 
                        class="form-input"
                        placeholder="9XX XXX XXXX"
                        maxlength="15"
                        title="Enter phone number"
                        required
                        style="border-left:none; border-radius:0 8px 8px 0; flex:1;"
                    />
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Password <span class="required">*</span>
                </label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    <input id="password" type="password" class="form-input" placeholder="Password" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Confirm Password <span class="required">*</span>
                </label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    <input id="confirmPassword" type="password" class="form-input" placeholder="Confirm Password" required>
                </div>
            </div>

            <div class="checkbox-group">
                <label for="terms">Must be at least 8 characters</label>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>

            <!-- Divider -->
            <div style="display:flex; align-items:center; margin:16px 0;">
                <div style="flex:1; height:1px; background:#ddd;"></div>
                <span style="margin:0 12px; color:#999; font-size:0.85rem;">or</span>
                <div style="flex:1; height:1px; background:#ddd;"></div>
            </div>

            <!-- Google Sign-Up Button -->
            <div id="googleSignInBtn" style="display:flex; justify-content:center;"></div>

            <div class="login-link">
                Already have an account? <a href="student_login.html">Log in here</a>
            </div>
        </form>
    </div>

    <!-- Google Sign-In Step 2 Modal -->
    <div id="googleStep2Modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#fff; border-radius:16px; padding:32px; width:90%; max-width:480px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="text-align:center; margin-bottom:24px;">
                <img id="googleAvatarStep2" src="" alt="" style="width:64px; height:64px; border-radius:50%; margin-bottom:8px; display:none;">
                <h2 style="margin:0; font-size:1.3rem; color:#1a4545;">Complete Your Registration</h2>
                <p id="googleNameStep2" style="margin:4px 0 0; color:#666; font-size:0.9rem;"></p>
            </div>

            <div style="margin-bottom:16px;">
                <label style="font-size:0.85rem; font-weight:600; color:#333; display:block; margin-bottom:6px;">ID Number <span style="color:red">*</span></label>
                <input id="g_idNumber" type="text" placeholder="ID Number" style="width:100%; padding:10px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:0.95rem; box-sizing:border-box; outline:none;">
            </div>

            <div style="margin-bottom:16px;">
                <label style="font-size:0.85rem; font-weight:600; color:#333; display:block; margin-bottom:6px;">Program <span style="color:red">*</span></label>
                <select id="g_program" style="width:100%; padding:10px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:0.95rem; box-sizing:border-box; outline:none; background:#fff;">
                    <option value="">Select Program</option>
                </select>
            </div>

            <div style="margin-bottom:16px;">
                <label style="font-size:0.85rem; font-weight:600; color:#333; display:block; margin-bottom:6px;">Year Level <span style="color:red">*</span></label>
                <select id="g_yearLevel" style="width:100%; padding:10px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:0.95rem; box-sizing:border-box; outline:none; background:#fff;">
                    <option value="">Select Year</option>
                </select>
            </div>

            <div style="margin-bottom:16px;">
                <label style="font-size:0.85rem; font-weight:600; color:#333; display:block; margin-bottom:6px;">Guardian Contact Number <span style="color:red">*</span></label>
                <div style="display:flex; align-items:stretch; border:1.5px solid #ddd; border-radius:8px; overflow:hidden;">
                    <select id="g_countryCode" style="background:#e8f0f0;border:none;border-right:1.5px solid #ddd;padding:0 8px;font-weight:600;color:#1a4545;font-size:0.9rem;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;padding-right:24px;background-image:url('data:image/svg+xml;utf8,<svg fill='%231a4545' height='12' viewBox='0 0 24 24' width='12' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>');background-repeat:no-repeat;background-position:right 4px center;">
                        <option value="+63">🇵🇭 +63</option>
                        <option value="+1">🇺🇸 +1</option>
                        <option value="+44">🇬🇧 +44</option>
                        <option value="+61">🇦🇺 +61</option>
                        <option value="+81">🇯🇵 +81</option>
                        <option value="+82">🇰🇷 +82</option>
                        <option value="+86">🇨🇳 +86</option>
                        <option value="+65">🇸🇬 +65</option>
                        <option value="+60">🇲🇾 +60</option>
                        <option value="+66">🇹🇭 +66</option>
                        <option value="+62">🇮🇩 +62</option>
                        <option value="+84">🇻🇳 +84</option>
                        <option value="+91">🇮🇳 +91</option>
                        <option value="+971">🇦🇪 +971</option>
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+49">🇩🇪 +49</option>
                        <option value="+33">🇫🇷 +33</option>
                        <option value="+39">🇮🇹 +39</option>
                        <option value="+34">🇪🇸 +34</option>
                        <option value="+55">🇧🇷 +55</option>
                        <option value="+52">🇲🇽 +52</option>
                        <option value="+27">🇿🇦 +27</option>
                        <option value="+234">🇳🇬 +234</option>
                    </select>
                    <input id="g_guardianContact" type="tel" placeholder="9XX XXX XXXX" maxlength="15" style="flex:1; padding:10px 14px; border:none; font-size:0.95rem; box-sizing:border-box; outline:none;">
                </div>
            </div>

            <div style="margin-bottom:16px;">
                <label style="font-size:0.85rem; font-weight:600; color:#333; display:block; margin-bottom:6px;">Password <span style="color:red">*</span></label>
                <input id="g_password" type="password" placeholder="At least 8 characters" style="width:100%; padding:10px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:0.95rem; box-sizing:border-box; outline:none;">
            </div>

            <div style="margin-bottom:24px;">
                <label style="font-size:0.85rem; font-weight:600; color:#333; display:block; margin-bottom:6px;">Confirm Password <span style="color:red">*</span></label>
                <input id="g_confirmPassword" type="password" placeholder="Confirm password" style="width:100%; padding:10px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:0.95rem; box-sizing:border-box; outline:none;">
            </div>

            <button onclick="handleGoogleStep2Submit()" style="width:100%; padding:12px; background:#1a4545; color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; margin-bottom:10px;">Complete Registration</button>
            <button onclick="closeGoogleStep2()" style="width:100%; padding:10px; background:transparent; color:#888; border:1.5px solid #ddd; border-radius:8px; font-size:0.9rem; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="student_registration.js"></script>
</body>
</html>
