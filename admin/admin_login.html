<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PanPacific University</title>
    <link rel="stylesheet" href="/css/admin-css/admin_global.css">
    <link rel="stylesheet" href="/css/admin-css/admin_login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">
               <img src="../public/logo.png" alt="Logo">
            </div>
        </div>

        <div class="welcome-text">
            <h2>Welcome back! Please login</h2>
            <p>to your account.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    <input type="email" id="emailInput" class="form-input" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    <input type="password" id="passwordInput" class="form-input" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('ppu_admin_email');
            if (savedEmail) {
                document.getElementById('emailInput').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        const URL_BASED = 'https://32g7g83w-3000.asse.devtunnels.ms/api/v1'

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            // Show loading
            Swal.fire({
                    title: 'Logging in...',
                    didOpen: () => Swal.showLoading()
            });
            try {
                const response = await fetch(`${URL_BASED}/authentication/admin_login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Invalid credentials');
                }
                
                localStorage.setItem('admin_token', data.token);
                
                if (data.user) {
                    localStorage.setItem('admin_user', JSON.stringify(data.user));
                }

                if (rememberMe) {
                    localStorage.setItem('ppu_admin_email', email);
                } else {
                    localStorage.removeItem('ppu_admin_email');
                }

                await Swal.fire({
                    icon: 'success',
                    title: 'Welcome!',
                    text: 'Login successful. Redirecting...',
                    timer: 1500,
                    showConfirmButton: false
                });

                window.location.href = 'admin_dashboard.html'; 

            } catch (error) {
                console.error(error);
                Swal.fire({
                    icon: 'error',
                    title: 'Login Failed',
                    text: error.message
                });
            }
        });

        document.querySelector('.forgot-password').addEventListener('click', async function(e) {
            e.preventDefault();

            // Step 1 — Email
            const { value: email, isConfirmed: step1ok } = await Swal.fire({
                title: 'Forgot Password',
                text: 'Enter your admin email address.',
                input: 'email',
                inputPlaceholder: 'admin@panpacificu.edu.ph',
                showCancelButton: true,
                confirmButtonText: 'Send OTP',
                confirmButtonColor: '#3d6b6b',
                inputValidator: v => !v && 'Please enter your email.'
            });
            if (!step1ok || !email) return;

            Swal.fire({ title: 'Sending OTP...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const r1 = await fetch(`${URL_BASED}/admin/forgot_password/request_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const d1 = await r1.json();
                if (!r1.ok) throw new Error(d1.message);
            } catch (err) {
                return Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            }

            // Step 2 — OTP
            const { value: otp, isConfirmed: step2ok } = await Swal.fire({
                title: 'Enter OTP',
                html: `<p style="margin-bottom:12px;font-size:14px;color:#666">A 6-digit code was sent to <strong>${email}</strong>. Valid for 5 minutes.</p>
                       <input id="swal-otp" class="swal2-input" maxlength="6" placeholder="_ _ _ _ _ _"
                              style="font-size:28px;letter-spacing:10px;text-align:center;width:200px">`,
                showCancelButton: true,
                confirmButtonText: 'Verify',
                confirmButtonColor: '#3d6b6b',
                preConfirm: () => {
                    const v = document.getElementById('swal-otp').value.trim();
                    if (!/^\d{6}$/.test(v)) { Swal.showValidationMessage('Enter the 6-digit code.'); return false; }
                    return v;
                }
            });
            if (!step2ok || !otp) return;

            Swal.fire({ title: 'Verifying...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const r2 = await fetch(`${URL_BASED}/admin/forgot_password/verify_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const d2 = await r2.json();
                if (!r2.ok) throw new Error(d2.message);
            } catch (err) {
                return Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            }

            // Step 3 — New Password
            const { value: passwords, isConfirmed: step3ok } = await Swal.fire({
                title: 'Set New Password',
                html: `<input id="swal-newpw" type="password" class="swal2-input" placeholder="New password">
                       <input id="swal-confirmpw" type="password" class="swal2-input" placeholder="Confirm new password">`,
                showCancelButton: true,
                confirmButtonText: 'Reset Password',
                confirmButtonColor: '#3d6b6b',
                preConfirm: () => {
                    const np = document.getElementById('swal-newpw').value;
                    const cp = document.getElementById('swal-confirmpw').value;
                    if (np.length < 6) { Swal.showValidationMessage('Password must be at least 6 characters.'); return false; }
                    if (np !== cp)     { Swal.showValidationMessage('Passwords do not match.'); return false; }
                    return { new_password: np, confirm_password: cp };
                }
            });
            if (!step3ok || !passwords) return;

            Swal.fire({ title: 'Resetting...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const r3 = await fetch(`${URL_BASED}/admin/forgot_password/reset_password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, ...passwords })
                });
                const d3 = await r3.json();
                if (!r3.ok) throw new Error(d3.message);
                Swal.fire({ icon: 'success', title: 'Password Reset!', text: 'You can now log in with your new password.', confirmButtonColor: '#3d6b6b' });
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            }
        });
    </script>
</body>
</html>
